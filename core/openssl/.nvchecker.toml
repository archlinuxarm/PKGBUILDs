[openssl]
source = 'git'
git = 'https://github.com/openssl/openssl.git'
prefix = 'openssl-'
# pinned to 3.x; 4.x migration tracked in
# https://gitlab.archlinux.org/archlinux/packaging/packages/openssl/-/work_items/12
# OpenSSL 3.6 EOL: 2026-11-01
include_regex = 'openssl-3\.[0-9]+\.[0-9]+'

